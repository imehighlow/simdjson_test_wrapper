name: conda-build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash -el {0}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v5

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: build
          python-version: ${{ matrix.python }}
          channels: defaults
          channel-priority: flexible
          auto-update-conda: true

      - name: Install build tools
        run: conda install -y conda-build anaconda-client

      - name: Build package
        run: |
          conda build recipe \
            --python "${{ matrix.python }}" \
            --output-folder conda-bld

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: conda-${{ matrix.os }}-py${{ matrix.python }}
          path: conda-bld/**/simdjson-test-wrapper-*.conda
          if-no-files-found: error

  upload:
    name: upload to anaconda
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: upload
          python-version: "3.13"
          channels: defaults
          auto-update-conda: true

      - name: Install anaconda-client
        run: conda install -y anaconda-client

      - name: Upload packages
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          test -n "$ANACONDA_TOKEN"
          find artifacts -name "*.conda" -print0 \
            | xargs -0 anaconda -t "$ANACONDA_TOKEN" upload --skip-existing
